name: Cleanup merged branches

# main にマージ済みの claude/* リモートブランチを定期削除して、
# セッションブランチの溜まりすぎ（墓場化）を防ぐ。
# GitHub Actions はサーバー側で動き、GITHUB_TOKEN(contents: write) で
# ブランチ削除が通るため、Web セッション特有の push 制限(403)を受けない。

on:
  schedule:
    # 毎週日曜 03:00 JST（= 土曜 18:00 UTC）。cron は UTC 解釈。
    - cron: '0 18 * * 6'
  workflow_dispatch:
    inputs:
      dry_run:
        description: '削除せず対象一覧だけ出す（true で実行されない）'
        type: boolean
        default: false
      stale_days:
        description: '最終更新からこの日数を超えたものだけ削除（誤って直近の作業中ブランチを消さない安全弁）'
        type: string
        default: '3'

permissions:
  contents: write

concurrency:
  group: cleanup-merged-branches
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete merged claude/* branches
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          STALE_DAYS: ${{ github.event.inputs.stale_days || '3' }}
        run: |
          set -euo pipefail

          # 全リモートブランチ情報をミラーしておく（checkout は既定だと単一ブランチしか持たない）
          git fetch --prune origin '+refs/heads/*:refs/remotes/origin/*'

          now=$(date +%s)
          cutoff=$(( STALE_DAYS * 24 * 3600 ))
          deleted=0
          skipped=0

          # main にマージ済み かつ claude/ 配下 のリモートブランチだけを対象にする
          while read -r ref; do
            br=${ref#origin/}

            # 二重防御：main / HEAD は絶対に消さない
            case "$br" in
              main|HEAD|"") continue ;;
            esac

            # 安全弁：直近 STALE_DAYS 日以内に更新があるブランチは（作業中の可能性があるので）残す
            ts=$(git log -1 --format=%ct "origin/$br")
            age=$(( now - ts ))
            if [ "$age" -lt "$cutoff" ]; then
              echo "skip (updated < ${STALE_DAYS}d): $br"
              skipped=$((skipped + 1))
              continue
            fi

            if [ "$DRY_RUN" = "true" ]; then
              echo "would delete: $br"
            else
              echo "deleting: $br"
              git push origin --delete "$br"
              deleted=$((deleted + 1))
            fi
          done < <(git branch -r --merged origin/main | sed 's/^[* ]*//' | grep '^origin/claude/' || true)

          echo "---"
          echo "done. dry_run=${DRY_RUN} deleted=${deleted} skipped(recent)=${skipped}"
