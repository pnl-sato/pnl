name: Cleanup merged branches

# main にマージ済みの claude/* リモートブランチを定期削除して、
# セッションブランチの溜まりすぎ（墓場化）を防ぐ。
#
# 重要：マージ判定はランナー上のローカル git を使わない。
#   検証の結果、actions/checkout 環境のローカル git は同じ SHA でも到達性を
#   誤判定し（未マージ枝を ahead=0 と誤る）、未マージ作業を削除する事故につながる。
#   そこで列挙・マージ判定・削除をすべて GitHub REST API 経由で行い、
#   到達性は compare API（サーバ側の正しい計算）の ahead_by==0 だけを「マージ済み」とする。
#
# 安全弁：
#   - ahead_by==0（main に無いコミットが0本）のものだけ削除対象。
#   - 直近 STALE_DAYS 日以内に更新のあるブランチ（作業中の可能性）は残す。
#   - 候補数が MAX_DELETE を超えたら中断（暴走ガード）。
#   - dry_run=true で削除せず対象一覧だけ出す。

on:
  schedule:
    # 毎週日曜 03:00 JST（= 土曜 18:00 UTC）。cron は UTC 解釈。
    - cron: '0 18 * * 6'
  workflow_dispatch:
    inputs:
      dry_run:
        description: '削除せず対象一覧だけ出す（true で実行されない）'
        type: boolean
        default: false
      stale_days:
        description: '最終更新からこの日数を超えたものだけ削除（作業中ブランチの保護）'
        type: string
        default: '3'
      max_delete:
        description: '1回の実行で削除する上限本数（超えたら中断）'
        type: string
        default: '40'

permissions:
  contents: write

concurrency:
  group: cleanup-merged-branches
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete merged claude/* branches (authoritative via GitHub API)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          STALE_DAYS: ${{ github.event.inputs.stale_days || '3' }}
          MAX_DELETE: ${{ github.event.inputs.max_delete || '40' }}
        run: |
          set -euo pipefail

          now=$(date -u +%s)
          cutoff=$(( STALE_DAYS * 24 * 3600 ))
          echo "DRY_RUN=${DRY_RUN} STALE_DAYS=${STALE_DAYS} MAX_DELETE=${MAX_DELETE} now=${now}"
          echo "==============================="

          # claude/* ブランチを API から列挙（ローカル git の到達性は信用しない）
          mapfile -t branches < <(gh api --paginate "repos/${REPO}/branches" --jq '.[].name' | grep '^claude/' || true)
          echo "claude/* branches found: ${#branches[@]}"

          skipped_recent=0
          skipped_unmerged=0
          to_delete=()

          for br in "${branches[@]:-}"; do
            [ -z "$br" ] && continue

            # マージ判定：compare API の ahead_by（main に無いコミット数）。0 本＝完全にマージ済み。
            ahead=$(gh api "repos/${REPO}/compare/main...${br}" --jq '.ahead_by')
            if [ "$ahead" != "0" ]; then
              echo "skip (NOT merged, ahead=${ahead}): ${br}"
              skipped_unmerged=$((skipped_unmerged + 1))
              continue
            fi

            # 安全弁：直近 STALE_DAYS 日以内に更新があるブランチは残す
            cdate=$(gh api "repos/${REPO}/commits/${br}" --jq '.commit.committer.date')
            ts=$(date -u -d "${cdate}" +%s)
            age=$(( now - ts ))
            if [ "$age" -lt "$cutoff" ]; then
              echo "skip (updated < ${STALE_DAYS}d): ${br}"
              skipped_recent=$((skipped_recent + 1))
              continue
            fi

            to_delete+=("$br")
          done

          count=${#to_delete[@]}
          echo "==============================="
          echo "delete candidates: ${count}"
          if [ "$count" -gt 0 ]; then
            printf '  - %s\n' "${to_delete[@]}"
          fi

          # 暴走ガード：想定外に大量削除しようとしたら中断
          if [ "$count" -gt "$MAX_DELETE" ]; then
            echo "ABORT: candidates ${count} exceed MAX_DELETE=${MAX_DELETE}. Aborting for safety."
            exit 1
          fi

          deleted=0
          for br in "${to_delete[@]:-}"; do
            [ -z "$br" ] && continue
            if [ "$DRY_RUN" = "true" ]; then
              echo "would delete: ${br}"
            else
              echo "deleting: ${br}"
              gh api -X DELETE "repos/${REPO}/git/refs/heads/${br}"
              deleted=$((deleted + 1))
            fi
          done

          echo "==============================="
          echo "done. dry_run=${DRY_RUN} deleted=${deleted} candidates=${count} skipped_recent=${skipped_recent} skipped_unmerged=${skipped_unmerged}"
